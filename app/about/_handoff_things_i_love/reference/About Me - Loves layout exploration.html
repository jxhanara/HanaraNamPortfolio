<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>About Me — "Things I love" layout exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="layout-a.jsx"></script>
  <script type="text/babel" src="layout-b.jsx"></script>
  <script type="text/babel" src="layout-c.jsx"></script>
  <script type="text/babel" src="layout-d.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <window.DesignCanvas
          title="About Me · §04 Things I love"
          subtitle="Three layouts that keep images + detail in one viewport — desktop ≈1440×860."
        >
          <window.DCSection id="layouts" title="Layout directions">
            <window.DCArtboard
              id="D"
              label="D · Hybrid — text bottom-left, big photo right (recommended)"
              width={1440}
              height={860}
            >
              <window.LayoutD />
            </window.DCArtboard>

            <window.DCArtboard
              id="A"
              label="A · Featured hero + thumb rail"
              width={1440}
              height={860}
            >
              <window.LayoutA />
            </window.DCArtboard>

            <window.DCArtboard
              id="B"
              label="B · Magazine spread (detail-left, mosaic-right)"
              width={1440}
              height={860}
            >
              <window.LayoutB />
            </window.DCArtboard>

            <window.DCArtboard
              id="C"
              label="C · Filmstrip carousel + filmstrip"
              width={1440}
              height={860}
            >
              <window.LayoutC />
            </window.DCArtboard>
          </window.DCSection>
        </window.DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
