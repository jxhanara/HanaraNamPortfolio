<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio — Home redesign exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="home-styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="home-data.jsx"></script>
  <script type="text/babel" src="home-shared.jsx"></script>
  <script type="text/babel" src="home-graphics.jsx"></script>
  <script type="text/babel" src="hero-a.jsx"></script>
  <script type="text/babel" src="hero-b.jsx"></script>
  <script type="text/babel" src="hero-c.jsx"></script>
  <script type="text/babel" src="hero-d.jsx"></script>
  <script type="text/babel" src="hero-e.jsx"></script>
  <script type="text/babel" src="hero-f.jsx"></script>
  <script type="text/babel" src="caps-a.jsx"></script>
  <script type="text/babel" src="caps-b.jsx"></script>
  <script type="text/babel" src="caps-c.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <window.TweaksProvider>
          <window.DesignCanvas
            title="Portfolio · Home redesign"
            subtitle="Three hero directions and three capabilities directions — tweak from the bottom-right."
          >
            <window.DCSection
              id="heros-v2"
              title="Hero — round 2"
              subtitle="Simpler. Greeting + tagline + meta + the next project peeking at the bottom of the viewport so work surfaces immediately (Chris-Welch homage)."
            >
              <window.DCArtboard
                id="heroD"
                label="D · Type-only minimal (Chris Welch homage)"
                width={1440}
                height={900}
              >
                <window.HeroD />
              </window.DCArtboard>
              <window.DCArtboard
                id="heroE"
                label="E · Greeting + Kiki + peek (refined current)"
                width={1440}
                height={900}
              >
                <window.HeroE />
              </window.DCArtboard>
              <window.DCArtboard
                id="heroF"
                label="F · Baby's-breath bouquet + greeting + peek (Holly-Zhu vibe, personal)"
                width={1440}
                height={900}
              >
                <window.HeroF />
              </window.DCArtboard>
            </window.DCSection>

            <window.DCSection
              id="caps"
              title="How I can help — chosen direction"
              subtitle="You picked B. Kept it here so you can scrub past the hero straight into it."
            >
              <window.DCArtboard
                id="capsB"
                label="B · Tabbed serif titles + detail rail (chosen)"
                width={1440}
                height={820}
              >
                <window.CapsB />
              </window.DCArtboard>
            </window.DCSection>

            <window.DCSection
              id="heros-v1"
              title="Hero — earlier iterations"
              subtitle="Kept around for reference. Scroll up for the latest round."
            >
              <window.DCArtboard
                id="heroA"
                label="A · Editorial scaled lead"
                width={1440}
                height={780}
              >
                <window.HeroA />
              </window.DCArtboard>
              <window.DCArtboard
                id="heroB"
                label="B · Statement + selected-work TOC"
                width={1440}
                height={780}
              >
                <window.HeroB />
              </window.DCArtboard>
              <window.DCArtboard
                id="heroC"
                label="C · Statement + 'Now' band"
                width={1440}
                height={780}
              >
                <window.HeroC />
              </window.DCArtboard>
            </window.DCSection>
          </window.DesignCanvas>

          <window.TweaksPanel />
        </window.TweaksProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
